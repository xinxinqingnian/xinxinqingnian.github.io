<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>新新青年 · 管理后台</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft Yahei", sans-serif;
  -webkit-tap-highlight-color: transparent;
}
body {
  background: #f5f5f5;
  padding: 12px;
  max-width: 100%;
}
.head {
  text-align: center;
  margin: 16px 0 10px;
}
.head h1 {
  font-size: 20px;
}
.tip {
  color: #007bff;
  font-size: 12px;
  text-align: center;
  margin-bottom: 16px;
  line-height: 1.4;
}
.form {
  background: #fff;
  padding: 14px;
  border-radius: 12px;
  margin-bottom: 16px;
}
.form input,
.form textarea,
.form select {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 15px;
}
.form textarea {
  min-height: 100px;
  resize: vertical;
}
.form button {
  width: 100%;
  background: #007bff;
  color: white;
  border: none;
  padding: 14px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: bold;
}
.item {
  background: white;
  padding: 14px;
  border-radius: 12px;
  margin-bottom: 12px;
}
.item h3 {
  font-size: 16px;
  margin-bottom: 6px;
}
.info {
  font-size: 12px;
  color: #666;
  margin-bottom: 8px;
}
.content {
  background: #f8f9fa;
  padding: 10px;
  border-radius: 6px;
  font-size: 13px;
  white-space: pre-wrap;
  margin-bottom: 10px;
  line-height: 1.5;
}
.btns {
  display: flex;
  gap: 8px;
}
.btn {
  flex: 1;
  padding: 10px 0;
  border: none;
  border-radius: 6px;
  color: white;
  font-size: 13px;
  font-weight: bold;
}
.btn.blue { background: #007bff; }
.btn.red { background: #f44336; }

.code-box {
  background: white;
  padding: 12px;
  border-radius: 10px;
  margin-top: 20px;
  border: 1px solid #ddd;
}
.code-box strong {
  font-size: 13px;
  display: block;
  margin-bottom: 8px;
}
.code-box pre {
  font-size: 11px;
  white-space: pre-wrap;
  max-height: 180px;
  overflow-y: auto;
  color: #333;
}
</style>
</head>
<body>

<div class="head">
  <h1>新新青年 · 管理后台</h1>
  <div class="tip">修改后复制底部代码 → 覆盖 GitHub 上的 admin.html</div>
</div>

<div class="form">
  <input type="text" id="title" placeholder="文章标题">
  <input type="text" id="author" placeholder="作者">
  <select id="cate">
    <option value="青年观点">青年观点</option>
    <option value="文艺副刊">文艺副刊</option>
    <option value="生活纪实">生活纪实</option>
    <option value="行动倡议">行动倡议</option>
    <option value="其他">其他</option>
  </select>
  <textarea id="content" placeholder="文章内容"></textarea>
  <button onclick="addArticle()">添加文章</button>
</div>

<div id="list"></div>

<div class="code-box">
  <strong>复制这一段覆盖 admin.html 里的 window.articleData</strong>
  <pre id="codeOut"></pre>
</div>

<script>
window.articleData = [
  {
    title: "发刊词：我们为什么要办这份报刊？",
    author: "新新青年",
    cate: "青年观点",
    content: "为了让更多青年发出自己的声音，为了独立思考，为了不盲从，为了在这个喧嚣的时代里，保留一份清醒与热爱。\n这里是属于我们的阵地，记录思考，分享故事，传递温度。",
    check: true
  }
  {
    "title": "凌晨5:40的灯",
    "author": "匿名",
    "cate": "青年观点",
    "content": "我见过凌晨五点四十的灯\n\n不是一盏，是几十盏。不是一个教室，是整栋楼。天还没亮，灯已经亮了。灯下是一排排低着的头。不是一两个，是几十个。他们不是在背书，是在被书吞掉\n\n这是衡水模式的一天：5:30起床，22:10熄灯，一天14.5小时学习。吃饭计时，午休不许上厕所，洗漱只有20分钟。一个月回家一次，手机没收，教室有摄像头，班主任随时调出来看你在干什么。跑操要打分，自习要“零抬头”，上厕所要打报告。一切都被量化，一切都被比较，一切都被安排。没有“自己的时间”，没有“自己的空间”，没有“自己的想法”\n\n2019年，衡水中学考上清华北大的有275人，占河北省名额的98.5%。听起来很牛？那年他们全校几千人。剩下那几千人，去哪了？他们不是模式牛，是生源牛。2025年，国家禁止跨区域“掐尖”招生，清北录取人数掉到45人，不到六年前的两成。那些说“衡水模式能化腐朽为神奇”的人，现在不说话了\n\n但代价呢？有人说是“高考加工厂”，有人说是“人间地狱”，有人说是“把人当机器”。一个学生说，他在衡水待了三年，不知道自己喜欢什么，不知道自己要什么，只知道分数。一个老师说，他带了三届毕业班，不知道学生叫什么名字，只知道排名。一个家长说，她孩子考上大学后，再也没碰过书。他们把人当燃料，烧完就换。烧得好的，送进名校当合格品；烧不好的，扔回社会自生自灭。燃料不问疼不疼，只问能烧多久\n\n衡水模式不是学校，是工厂。学生不是人，是原料。高考不是考试，是出厂检验。考上清北的是合格品，考不上的是次品。他们不关心你疼不疼，只关心你考多少分。他们不关心你是谁，只关心你排第几。他们不关心你要去哪，只关心你能给学校贴多少金。他们不是教育者，是资本家。他们不是老师，是监工。他们不是为你服务，是为自己口袋服务。学费每年2-3万，复读生5-8万，外地生更高。全国上百所分校，每一所都是印钞机。教辅、试卷、培训、夏令营、研学游，一条龙服务。2020年旗下公司曾冲击港股上市。你以为是学校，其实是公司。你以为是教育，其实是生意。你以为是为你，其实是为他们\n\n他们不是现代教育，是封建教育的现代翻版。古代用忠孝奴役人，他们用分数奴役人。古代把人分成士农工商，他们把人分成考上和没考上。古代说“学而优则仕”，他们说“分高则人”。古代不许质疑皇帝，他们不许质疑老师。古代让你跪，他们让你低头。你以为你自由了，其实你换了一种方式跪着。你以为你在读书，其实你在被书吞掉。你以为你在学习，其实你在被驯化。你以为你在走向未来，其实你在走向别人给你画好的笼子\n\n他们不是社会主义建设者，是社会主义的阻碍者。社会主义要人的全面发展，他们把人压成考试机器。社会主义要独立思考，他们不许质疑。社会主义要批判精神，他们只给标准答案。社会主义要创造能力，他们只会刷题。社会主义要平等，他们分高就是人，分低不是人。他们培养出来的人，到社会上不会反抗，不会质疑，不会思考。他们只会服从，只会内卷，只会为资本打工。这不是在培养社会主义接班人，这是在培养资本家的好奴才\n\n我们不是在反对谁。我们只是在问：每天凌晨五点四十起床，晚上十点熄灯，中间14.5小时学习。我们没时间看课外书，没时间想问题，没时间成为自己。我们到底在干什么？我们到底算什么？是工具，还是人？我们究竟为什么活着？是为分数活着？是为排名活着？是为考上好大学活着？是为让爸妈脸上有光活着？是为给学校贴金活着？还是为自己活着？",
    "check": true
  },
  {
    "title": "发刊词：我们为什么要办这份报刊？",
    "author": "新新青年",
    "cate": "青年观点",
    "content": "为了让更多青年发出自己的声音，为了独立思考，为了不盲从，为了在这个喧嚣的时代里，保留一份清醒与热爱。\n这里是属于我们的阵地，记录思考，分享故事，传递温度。",
    "check": true
    }];

function render() {
  let html = "";
  window.articleData.forEach((art, i) => {
    html += `
    <div class="item">
      <h3>${art.title}</h3>
      <div class="info">${art.author}｜${art.cate}</div>
      <div class="content">${art.content}</div>
      <div class="info">${art.check ? '✅ 已发布' : '⏸ 待审核'}</div>
      <div class="btns">
        <button class="btn blue" onclick="toggle(${i})">${art.check ? '下架' : '发布'}</button>
        <button class="btn red" onclick="del(${i})">删除</button>
      </div>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
  updateCode();
}

function updateCode() {
  const str = JSON.stringify(window.articleData, null, 2);
  document.getElementById("codeOut").innerText = "window.articleData = " + str + ";";
}

function addArticle() {
  const title = document.getElementById("title").value.trim();
  const author = document.getElementById("author").value.trim();
  const cate = document.getElementById("cate").value;
  const content = document.getElementById("content").value.trim();
  if (!title || !author || !content) return alert("请填写完整");
  window.articleData.unshift({ title, author, cate, content, check: false });
  document.getElementById("title").value = "";
  document.getElementById("content").value = "";
  render();
}

function toggle(i) {
  window.articleData[i].check = !window.articleData[i].check;
  render();
}

function del(i) {
  if (!confirm("确定删除？")) return;
  window.articleData.splice(i, 1);
  render();
}

render();
</script>
</body>
</html>
