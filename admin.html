<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>后台管理 - 新新青年</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  padding: 20px;
  max-width: 900px;
  margin: 0 auto;
}
.header {
  text-align: center;
  margin-bottom: 20px;
}
.article {
  background: #fff;
  padding: 16px;
  border-radius: 10px;
  margin-bottom: 12px;
}
.article h3 {
  margin-bottom: 8px;
}
.article .info {
  font-size: 14px;
  color: #666;
  margin-bottom: 8px;
}
.article .content {
  line-height: 1.6;
  margin: 10px 0;
}
.btn {
  padding: 6px 12px;
  border: none;
  border-radius: 6px;
  color: #fff;
  cursor: pointer;
  margin-right: 6px;
}
.pass {
  background: #28a745;
}
.nopass {
  background: #dc3545;
}
.del {
  background: #666;
}
</style>
</head>
<body>

<div class="header">
  <h1>后台管理 - 稿件审核</h1>
  <p>仅管理员可见</p>
</div>

<div id="adminList"></div>

<script>
// 稿件数据（和前台 index.html 保持一致）
const articles = [

];

const adminList = document.getElementById('adminList');

// 渲染稿件列表
function renderAdmin() {
  let html = '';
  articles.forEach((art, i) => {
    const status = art.check ? '✅ 通过' : '⏳ 待审核';
    html += `
    <div class="article">
      <h3>${art.title}</h3>
      <div class="info">作者：${art.author}｜${art.cate}｜${status}</div>
      <div class="content">${art.content}</div>
      <button class="btn pass" onclick="setPass(${i})">通过</button>
      <button class="btn nopass" onclick="setNoPass(${i})">不通过</button>
      <button class="btn del" onclick="del(${i})">删除</button>
    </div>`;
  });
  adminList.innerHTML = html;
}

// 审核通过
function setPass(i) {
  articles[i].check = true;
  renderAdmin();
}

// 审核不通过
function setNoPass(i) {
  articles[i].check = false;
  renderAdmin();
}

// 删除稿件
function del(i) {
  articles.splice(i, 1);
  renderAdmin();
}

// 初始渲染
renderAdmin();
</script>
</body>
</html>
