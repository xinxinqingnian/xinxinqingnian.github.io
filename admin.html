<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>新新青年 · 管理后台</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft Yahei", sans-serif;
  }
  body {
    background-color: #f5f5f5;
    padding: 20px;
    max-width: 900px;
    margin: 0 auto;
  }
  h1 {
    text-align: center;
    margin: 30px 0;
    font-size: 24px;
  }
  .item {
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 15px;
  }
  .item h3 {
    font-size: 18px;
    margin-bottom: 8px;
  }
  .info {
    color: #666;
    font-size: 14px;
    margin-bottom: 10px;
  }
  .content {
    background: #f8f9fa;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 12px;
    white-space: pre-wrap;
    line-height: 1.6;
  }
  .status {
    font-weight: bold;
    margin-bottom: 10px;
  }
  .del-btn {
    background: #f44336;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
  }
</style>
</head>
<body>
<h1>新新青年 · 管理后台</h1>
<div id="list"></div>
<script>
// 在这里写你的所有文章，示例已清空
window.articleData = [
  
];

function render() {
  let html = '';
  window.articleData.forEach((art, index) => {
    html += `
    <div class="item">
      <h3>${index + 1}. ${art.title}</h3>
      <div class="info">作者：${art.author} ｜ 分类：${art.cate}</div>
      <div class="content">${art.content}</div>
      <div class="status">${art.check ? '✅ 已发布' : '⏸ 待审核'}</div>
      <button class="del-btn" onclick="delArticle(${index})">删除此稿件</button>
    </div>
    `;
  });
  document.getElementById('list').innerHTML = html;
}

function delArticle(index) {
  if (!confirm('确定要删除这篇稿件吗？')) return;
  window.articleData.splice(index, 1);
  render();
}

render();
</script>
</body>
</html>
