<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>新新青年 - 管理后台</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            background: #d9251d;
            color: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            text-align: center;
        }
        .article-item {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 5px solid #ddd;
        }
        .article-item.published {
            border-left-color: #d9251d;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .meta {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .cate {
            background: #fef2f2;
            color: #d9251d;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 12px;
        }
        .content-preview {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            color: #444;
            margin-bottom: 12px;
            max-height: 100px;
            overflow: hidden;
        }
        .actions {
            display: flex;
            gap: 12px;
        }
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-publish { background: #d9251d; color: white; }
        .btn-delete { background: #6c757d; color: white; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #d9251d;
            text-decoration: none;
        }
        h2 { margin-bottom: 16px; font-size: 20px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← 返回前台</a>
    <div class="header">
        <h1>新新青年 · 管理后台</h1>
        <p>审核 | 发布 | 删除 文章</p>
    </div>
    <div id="articleList"></div>

    <script>
        const supabaseUrl = 'https://koiakmpmqcnmzqmxjcqh.supabase.co';
        const supabaseAnonKey = 'sb_publishable_L0gAHgGrnER0ARa4qVXQCg_lqM_ZEXI';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        async function loadArticles() {
            document.getElementById('articleList').innerHTML = '<div class="loading">加载中...</div>';
            const { data, error } = await supabase
                .from('articles')
                .select('*')
                .order('created_at', { ascending: false });
            if (error) {
                document.getElementById('articleList').innerHTML = '<div class="loading">加载失败：' + error.message + '</div>';
                return;
            }
            renderArticles(data);
        }

        function renderArticles(articles) {
            if (!articles.length) {
                document.getElementById('articleList').innerHTML = '<div class="loading">暂无文章</div>';
                return;
            }
            let html = '';
            for (let art of articles) {
                const isPublished = art.check === true;
                html += `
                    <div class="article-item ${isPublished ? 'published' : ''}">
                        <div class="title">${escapeHtml(art.title)}</div>
                        <div class="meta">
                            <span>作者：${escapeHtml(art.author)}</span>
                            <span class="cate">${escapeHtml(art.cate)}</span>
                            <span>${isPublished ? '✅ 已发布' : '⏳ 待审核'}</span>
                        </div>
                        <div class="content-preview">${escapeHtml((art.content || '').slice(0, 200))}${(art.content || '').length > 200 ? '...' : ''}</div>
                        <div class="actions">
                            <button class="btn-publish" data-id="${art.id}" data-current="${art.check}">${isPublished ? '⬇️ 下架' : '✅ 通过'}</button>
                            <button class="btn-delete" data-id="${art.id}">🗑️ 删除</button>
                        </div>
                    </div>
                `;
            }
            document.getElementById('articleList').innerHTML = html;

            // 绑定发布/下架事件
            document.querySelectorAll('.btn-publish').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.id;
                    const current = btn.dataset.current === 'true';
                    const newCheck = !current;
                    const { error } = await supabase
                        .from('articles')
                        .update({ check: newCheck })
                        .eq('id', id);
                    if (error) alert('操作失败：' + error.message);
                    else loadArticles();
                });
            });

            // 绑定删除事件
            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (!confirm('确定删除这篇文章吗？')) return;
                    const id = btn.dataset.id;
                    const { error } = await supabase
                        .from('articles')
                        .delete()
                        .eq('id', id);
                    if (error) alert('删除失败：' + error.message);
                    else loadArticles();
                });
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        loadArticles();
    </script>
</body>
</html>
