<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>新新青年 · 后台</title>
<style>
* {box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f6f6f6;padding:20px;max-width:900px;margin:auto}
h1{text-align:center;margin:20px 0}
.item{background:#fff;padding:16px;border-radius:12px;margin-bottom:12px}
.item h3{margin-bottom:6px}
.info{color:#666;font-size:14px;margin-bottom:8px}
.content{background:#f8f9fa;padding:10px;border-radius:6px;margin-bottom:10px}
.status{font-weight:bold}
</style>
</head>
<body>
<h1>新新青年 · 管理后台</h1>

<div id="list"></div>

<script>
// 这里和前台的 articles 保持完全一样！
const articles = [
  {
    title: "创刊词",
    author: "编辑部",
    cate: "青年观点",
    content: "我们是新新青年，为时代发声。",
    check: true
  },
  {
    title: "示例文章",
    author: "匿名",
    cate: "其他",
    content: "这是一篇测试文章。",
    check: false
  }
];

function render() {
  let html = '';
  articles.forEach((art, i) => {
    html += `
    <div class="item">
      <h3>${i+1}. ${art.title}</h3>
      <div class="info">作者：${art.author}｜${art.cate}</div>
      <div class="content">${art.content}</div>
      <div class="status">${art.check ? '✅ 已发布' : '⏸ 待审核'}</div>
    </div>`;
  });
  document.getElementById('list').innerHTML = html;
}

render();
</script>
</body>
</html>
