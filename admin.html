<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>新新青年 - 审核后台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f6f6f6;padding:20px;max-width:900px;margin:auto}
h1{text-align:center;margin:20px 0}
.tip{text-align:center;color:#666;margin-bottom:10px}
.auto{text-align:center;color:#1a73e8;margin-bottom:20px;font-size:14px}
.item{background:#fff;padding:16px;border-radius:12px;margin-bottom:12px}
.item h3{margin-bottom:6px}
.info{color:#666;font-size:14px;margin-bottom:8px}
.content{background:#f8f9fa;padding:10px;border-radius:6px;white-space:pre-wrap;margin-bottom:10px}
.status{font-weight:bold}
</style>
</head>
<body>

<h1>新新青年 · 审核后台</h1>
<p class="tip">在腾讯文档将 check 改为 TRUE 即可在前台显示</p>
<p class="auto">每30秒自动刷新一次</p>

<div id="list"></div>

<script>
const list = document.getElementById('list');

async function loadArticles() {
  const sheetUrl = "https://docs.qq.com/sheet/DYnp4ZUdodkx6Z3V5?tab=BB08J2&csv";
  const res = await fetch(sheetUrl);
  const text = await res.text();
  const rows = text.split('\n').slice(1);
  return rows.map((row,i) => {
    const cols = row.split(',');
    return {
      row:i+2,
      title:cols[12]||'无标题',
      author:cols[11]||'匿名',
      cate:cols[16]||'其他',
      content:cols[13]||'无内容',
      check:cols[17]=='TRUE'
    };
  });
}

function render(){
  loadArticles().then(data=>{
    let html='';
    data.forEach(art=>{
      html+=`
      <div class="item">
        <h3>第${art.row-1}篇 · ${art.title}</h3>
        <div class="info">作者：${art.author}｜分类：${art.cate}</div>
        <div class="content">${art.content}</div>
        <div class="status">
          状态：${art.check?'✅ 已通过':'⏸ 待审核'}
        </div>
      </div>`;
    });
    list.innerHTML = html;
  });
}

// 首次加载
render();

// 每30秒自动刷新
setInterval(render, 30000);
</script>
</body>
</html>
