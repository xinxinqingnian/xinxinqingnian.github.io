<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>新新青年 · 管理后台</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft Yahei", sans-serif;
}
body {
  background-color: #f5f5f5;
  padding: 20px;
  max-width: 900px;
  margin: 0 auto;
}
.head {
  text-align: center;
  margin: 20px 0;
}
.head h1 {
  font-size: 24px;
  margin-bottom: 8px;
}
.tip {
  color: #007bff;
  font-size: 14px;
  margin-bottom: 20px;
  text-align: center;
}
.form {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}
.form input,
.form textarea,
.form select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border: 1px solid #ddd;
  border-radius: 6px;
}
.form textarea {
  min-height: 100px;
}
.form button {
  background: #007bff;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
}
.item {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 15px;
}
.item h3 {
  margin-bottom: 8px;
  font-size: 18px;
}
.info {
  color: #666;
  font-size: 14px;
  margin-bottom: 10px;
}
.content {
  background: #f8f9fa;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 10px;
  white-space: pre-wrap;
}
.btns {
  display: flex;
  gap: 10px;
}
.btn {
  padding: 6px 12px;
  border: none;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}
.btn.blue { background: #007bff; }
.btn.red { background: #f44336; }
.btn.gray { background: #6c757d; }

.code-box {
  background: #fff;
  padding: 15px;
  border-radius: 8px;
  margin-top: 20px;
  border: 1px solid #ddd;
}
.code-box pre {
  white-space: pre-wrap;
  font-size: 12px;
  color: #333;
  max-height: 200px;
  overflow-y: auto;
}
</style>
</head>
<body>

<div class="head">
  <h1>新新青年 · 管理后台</h1>
  <div class="tip">修改后复制下方代码 → 覆盖 GitHub 上的 admin.html 即可永久生效</div>
</div>

<div class="form">
  <input type="text" id="title" placeholder="文章标题">
  <input type="text" id="author" placeholder="作者">
  <select id="cate">
    <option value="青年观点">青年观点</option>
    <option value="文艺副刊">文艺副刊</option>
    <option value="生活纪实">生活纪实</option>
    <option value="行动倡议">行动倡议</option>
    <option value="其他">其他</option>
  </select>
  <textarea id="content" placeholder="文章内容"></textarea>
  <button onclick="addArticle()">添加文章</button>
</div>

<div id="list"></div>

<div class="code-box">
  <strong>复制以下内容覆盖 admin.html 里的 window.articleData = [...];</strong>
  <pre id="codeOut"></pre>
</div>

<script>
window.articleData = [
  {
    title: "发刊词：我们为什么要办这份报刊？",
    author: "新新青年",
    cate: "青年观点",
    content: "为了让更多青年发出自己的声音，为了独立思考，为了不盲从，为了在这个喧嚣的时代里，保留一份清醒与热爱。\n这里是属于我们的阵地，记录思考，分享故事，传递温度。",
    check: true
  }
  
];

function render() {
  let html = "";
  window.articleData.forEach((art, i) => {
    html += `
    <div class="item">
      <h3>${art.title}</h3>
      <div class="info">作者：${art.author}｜${art.cate}</div>
      <div class="content">${art.content}</div>
      <div class="info">状态：${art.check ? '✅ 已发布' : '⏸ 待审核'}</div>
      <div class="btns">
        <button class="btn blue" onclick="toggle(${i})">${art.check ? '下架' : '发布'}</button>
        <button class="btn red" onclick="del(${i})">删除</button>
      </div>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
  updateCode();
}

function updateCode() {
  const str = JSON.stringify(window.articleData, null, 2);
  document.getElementById("codeOut").innerText = "window.articleData = " + str + ";";
}

function addArticle() {
  const title = document.getElementById("title").value.trim();
  const author = document.getElementById("author").value.trim();
  const cate = document.getElementById("cate").value;
  const content = document.getElementById("content").value.trim();
  if (!title || !author || !content) return alert("请填写完整");
  window.articleData.unshift({ title, author, cate, content, check: false });
  document.getElementById("title").value = "";
  document.getElementById("content").value = "";
  render();
}

function toggle(i) {
  window.articleData[i].check = !window.articleData[i].check;
  render();
}

function del(i) {
  if (!confirm("确定删除？")) return;
  window.articleData.splice(i, 1);
  render();
}

render();
</script>
</body>
</html>
