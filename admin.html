<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="新新青年管理后台，文章发布、编辑、审核、删除">
    <meta name="keywords" content="新新青年,后台管理,文章审核,投稿管理">
    <meta name="author" content="管理员">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>新新青年 - 管理后台</title>
    <style>
        /* ==============================================
           全局初始化
        ============================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-box-sizing: border-box;
            -moz-box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
            background-color: #fafafa;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            color: #222;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        body {
            padding: 15px;
            max-width: 820px;
            margin: 0 auto;
            padding-bottom: 120px;
        }

        ul,
        ol {
            list-style: none;
        }

        a {
            text-decoration: none;
            color: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        input,
        button,
        textarea,
        select {
            font-family: inherit;
            outline: none;
            border: none;
            background: none;
            resize: none;
        }

        /* ==============================================
           后台头部
        ============================================== */
        .admin-header {
            background-color: #fff;
            border-radius: 16px;
            padding: 28px 20px;
            text-align: center;
            margin-bottom: 24px;
            border-bottom: 3px solid #d9251d;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        .admin-header::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #d9251d, #b91c1c);
        }

        .admin-title {
            font-size: 28px;
            font-weight: 800;
            color: #d9251d;
            margin-bottom: 8px;
        }

        .admin-desc {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        /* ==============================================
           返回前台
        ============================================== */
        .back-to-front {
            text-align: center;
            margin-bottom: 26px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #d9251d;
            font-size: 15px;
            font-weight: 600;
            padding: 10px 20px;
            background-color: #fef2f2;
            border-radius: 999px;
            transition: all 0.25s ease;
        }

        .back-link:active {
            opacity: 0.9;
        }

        /* ==============================================
           文章发布表单
        ============================================== */
        .publish-form-module {
            background-color: #fff;
            border-radius: 18px;
            padding: 28px 24px;
            margin-bottom: 32px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
        }

        .form-title {
            font-size: 20px;
            font-weight: 700;
            color: #222;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-title::before {
            content: "✍️";
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            color: #222;
            margin-bottom: 10px;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 14px 16px;
            background-color: #f9fafb;
            border: 1px solid #eee;
            border-radius: 12px;
            font-size: 15px;
            color: #333;
            transition: all 0.3s ease;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            border-color: #d9251d;
            box-shadow: 0 0 0 3px rgba(217, 37, 29, 0.1);
        }

        .form-textarea {
            min-height: 200px;
            line-height: 1.6;
        }

        .submit-publish-btn {
            width: 100%;
            height: 56px;
            background: linear-gradient(90deg, #d9251d, #b91c1c);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 3px 10px rgba(217, 37, 29, 0.1);
        }

        .submit-publish-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 6px rgba(217, 37, 29, 0.08);
        }

        /* ==============================================
           文章管理列表
        ============================================== */
        .article-manager-section {
            margin-bottom: 40px;
        }

        .manager-section-title {
            font-size: 19px;
            font-weight: 700;
            color: #222;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 4px solid #d9251d;
        }

        .manager-article-item {
            background-color: #fff;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border-left: 4px solid #eee;
            transition: all 0.3s ease;
        }

        .manager-article-item.published {
            border-left-color: #d9251d;
        }

        .manager-article-title {
            font-size: 19px;
            font-weight: 700;
            color: #222;
            margin-bottom: 12px;
            line-height: 1.45;
        }

        .manager-article-meta {
            font-size: 13px;
            color: #666;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .manager-article-cate {
            padding: 3px 8px;
            background-color: #fef2f2;
            color: #d9251d;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
        }

        .manager-article-status {
            font-weight: 600;
        }

        .manager-article-content {
            background-color: #f9fafb;
            padding: 16px;
            border-radius: 10px;
            font-size: 14px;
            color: #555;
            max-height: 140px;
            overflow: hidden;
            line-height: 1.6;
            margin-bottom: 18px;
        }

        .manager-btn-group {
            display: flex;
            gap: 14px;
        }

        .manager-btn {
            flex: 1;
            height: 46px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-toggle-status {
            background-color: #d9251d;
            color: #fff;
        }

        .btn-delete-article {
            background-color: #6b7280;
            color: #fff;
        }

        .manager-btn:active {
            opacity: 0.9;
        }

        /* ==============================================
           数据同步代码区
        ============================================== */
        .data-code-section {
            background-color: #fff;
            border-radius: 18px;
            padding: 28px 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            border: 1px solid #eee;
        }

        .code-section-title {
            font-size: 18px;
            font-weight: 700;
            color: #222;
            margin-bottom: 20px;
        }

        .code-display-box {
            background-color: #f9fafb;
            border: 1px solid #eee;
            border-radius: 14px;
            padding: 20px;
            max-height: 320px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .code-pre {
            font-size: 13px;
            color: #333;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .code-tip-text {
            font-size: 14px;
            color: #d9251d;
            font-weight: 600;
            line-height: 1.6;
        }

        /* ==============================================
           响应式适配
        ============================================== */
        @media (max-width: 480px) {
            .admin-title {
                font-size: 24px;
            }

            .manager-article-title {
                font-size: 17px;
            }

            .code-display-box {
                padding: 14px;
            }

            .publish-form-module {
                padding: 22px 18px;
            }
        }
    </style>
</head>
<body>
    <!-- 后台头部 -->
    <header class="admin-header">
        <h1 class="admin-title">新新青年 · 管理后台</h1>
        <p class="admin-desc">文章发布、编辑、审核、上下架与数据管理</p>
    </header>

    <!-- 返回前台 -->
    <div class="back-to-front">
        <a href="index.html" class="back-link">← 返回前台首页</a>
    </div>

    <!-- 发布文章表单 -->
    <div class="publish-form-module">
        <h2 class="form-title">添加新文章</h2>
        <div class="form-group">
            <label class="form-label">文章标题</label>
            <input type="text" class="form-input" id="articleTitleInput" placeholder="请输入文章标题">
        </div>
        <div class="form-group">
            <label class="form-label">作者名称</label>
            <input type="text" class="form-input" id="articleAuthorInput" placeholder="请输入作者名称">
        </div>
        <div class="form-group">
            <label class="form-label">文章分类</label>
            <select class="form-select" id="articleCategorySelect">
                <option value="青年观点">青年观点</option>
                <option value="批判揭露">批判揭露</option>
                <option value="教育反思">教育反思</option>
                <option value="社会观察">社会观察</option>
                <option value="其他">其他</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">文章内容</label>
            <textarea class="form-textarea" id="articleContentInput" placeholder="请输入文章正文内容"></textarea>
        </div>
        <button class="submit-publish-btn" id="addArticleBtn">添加文章到管理列表</button>
    </div>

    <!-- 文章管理列表 -->
    <div class="article-manager-section">
        <h2 class="manager-section-title">文章管理列表</h2>
        <div id="managerArticleList"></div>
    </div>

    <!-- 数据同步代码区 -->
    <div class="data-code-section">
        <h3 class="code-section-title">前台同步数据代码</h3>
        <div class="code-display-box">
            <pre class="code-pre" id="syncDataCode"></pre>
        </div>
        <div class="code-tip-text">
            复制上方全部代码 → 替换本文件中 window.articleData = [...] 部分<br>
            上传更新后，前台网站将自动同步最新文章内容
        </div>
    </div>

    <script>
        // 文章数据（与前台互通）
        window.articleData = [];

        // DOM 元素
        const articleTitleInput = document.getElementById('articleTitleInput');
        const articleAuthorInput = document.getElementById('articleAuthorInput');
        const articleCategorySelect = document.getElementById('articleCategorySelect');
        const articleContentInput = document.getElementById('articleContentInput');
        const addArticleBtn = document.getElementById('addArticleBtn');
        const managerArticleList = document.getElementById('managerArticleList');
        const syncDataCode = document.getElementById('syncDataCode');

        // 渲染文章管理列表
        function renderManagerList() {
            let html = '';
            window.articleData.forEach((article, index) => {
                const statusText = article.check ? '已发布' : '未发布';
                const itemClass = article.check ? 'published' : '';

                html += `
                <div class="manager-article-item ${itemClass}">
                    <div class="manager-article-title">${article.title}</div>
                    <div class="manager-article-meta">
                        <span>作者：${article.author}</span>
                        <span class="manager-article-cate">${article.cate}</span>
                        <span class="manager-article-status">${statusText}</span>
                    </div>
                    <div class="manager-article-content">${article.content.slice(0, 180)}${article.content.length > 180 ? '...' : ''}</div>
                    <div class="manager-btn-group">
                        <button class="manager-btn btn-toggle-status" data-index="${index}">${article.check ? '下架文章' : '发布文章'}</button>
                        <button class="manager-btn btn-delete-article" data-index="${index}">删除文章</button>
                    </div>
                </div>`;
            });

            managerArticleList.innerHTML = html;

            // 更新同步代码
            const dataString = JSON.stringify(window.articleData, null, 2);
            syncDataCode.innerText = `window.articleData = ${dataString};`;

            // 绑定按钮事件
            bindManagerButtonEvents();
        }

        // 绑定管理按钮事件
        function bindManagerButtonEvents() {
            // 发布/下架
            document.querySelectorAll('.btn-toggle-status').forEach(btn => {
                btn.addEventListener('click', () => {
                    const index = btn.dataset.index;
                    window.articleData[index].check = !window.articleData[index].check;
                    renderManagerList();
                });
            });

            // 删除
            document.querySelectorAll('.btn-delete-article').forEach(btn => {
                btn.addEventListener('click', () => {
                    const index = btn.dataset.index;
                    if (!confirm('确定删除该文章？删除后无法恢复')) return;
                    window.articleData.splice(index, 1);
                    renderManagerList();
                });
            });
        }

        // 添加文章
        addArticleBtn.addEventListener('click', () => {
            const title = articleTitleInput.value.trim();
            const author = articleAuthorInput.value.trim();
            const cate = articleCategorySelect.value;
            const content = articleContentInput.value.trim();

            if (!title || !author || !content) {
                alert('请填写完整文章信息（标题、作者、内容均不能为空）');
                return;
            }

            window.articleData.unshift({
                title: title,
                author: author,
                cate: cate,
                content: content,
                check: false
            });

            // 清空输入框
            articleTitleInput.value = '';
            articleAuthorInput.value = '';
            articleContentInput.value = '';

            renderManagerList();
            alert('文章已成功添加到管理列表，请发布后前台显示');
        });

        // 初始化渲染
        window.addEventListener('DOMContentLoaded', renderManagerList);
    </script>
</body>
</html>
