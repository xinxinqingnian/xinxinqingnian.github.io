<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新新青年</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f5f5f5;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .header p {
            font-size: 18px;
            color: #666;
        }
        .submit {
            text-align: center;
            margin-bottom: 20px;
        }
        .submit a {
            display: inline-block;
            padding: 10px 24px;
            background: #007bff;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
        }
        .search {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .tab {
            padding: 8px 16px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        .tab.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        .article {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .article h3 {
            margin-bottom: 8px;
            font-size: 22px;
        }
        .article .info {
            color: #666;
            font-size: 14px;
        }
        .rules-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            border: 2px solid #333;
        }
        .rules-box h2 {
            font-size: 24px;
            margin-bottom: 15px;
        }
        .rules-box p {
            font-size: 18px;
            margin-bottom: 12px;
        }
        .rules-box strong {
            font-size: 20px;
        }
        .footer {
            text-align: center;
            font-size: 14px;
            color: #999;
            padding: 20px;
        }
        .footer a {
            color: #666;
            text-decoration: none;
            font-size: 16px;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal .box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal .close {
            margin-top: 15px;
            padding: 8px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>新新青年</h1>
        <p>为青年发声</p>
    </div>
    <div class="submit">
        <a href="https://wj.qq.com/s2/26084616/2a3d/" target="_blank">点击投稿</a>
    </div>
    <input class="search" id="search" placeholder="搜索文章标题或内容">
    <div class="tabs">
        <div class="tab active" data-cate="all">全部</div>
        <div class="tab" data-cate="青年观点">青年观点</div>
        <div class="tab" data-cate="文艺副刊">文艺副刊</div>
        <div class="tab" data-cate="生活纪实">生活纪实</div>
        <div class="tab" data-cate="行动倡议">行动倡议</div>
        <div class="tab" data-cate="其他">其他</div>
    </div>
    <div id="list">
        <!-- 示例文章，和你截图里的占位一致 -->
        <div class="article" onclick="openArt(0)">
            <h3>问卷里的文章标题</h3>
            <div class="info">作者：问卷里的作者名｜青年观点</div>
        </div>
    </div>
    <div class="rules-box">
        <h2>发文规则</h2>
        <p><strong>一、不反国家，不反党</strong><br>
        立足家国，维护公共利益，拒绝一切损害国家与社会稳定的言论。</p>
        <p><strong>二、不人身攻击，不指名道姓辱骂</strong><br>
        讨论现象，不针对个人；批判问题，不进行羞辱与网暴。</p>
        <p><strong>三、只写真实与真心</strong><br>
        写你看见的、听见的、想说的、经历的、相信的、希望的、恨的、爱的。</p>
        <p><strong>四、我们批判体系的黑暗面，而非全盘否定</strong><br>
        正视问题，反思弊病，目的是推动改变、守护公平。</p>
        <p style="margin-top:15px;font-weight:bold;">青年发声，有边界，有温度，有力量。</p>
    </div>
    <div class="footer">
        <p>© 2026 新新青年 · 思想与青年同行</p>
        <p style="margin-top:12px;">
            <a href="https://wj.qq.com/s2/25946661/7ccc/" target="_blank">腾讯问答</a>
        </p>
    </div>
    <div class="modal" id="modal">
        <div class="box">
            <h3 id="modalTitle"></h3>
            <div style="margin:10px 0; color:#666" id="modalInfo"></div>
            <div id="modalContent"></div>
            <button class="close" onclick="closeModal()">关闭</button>
        </div>
    </div>
<script>
// 示例文章数据，和你截图里的占位一致
let articles = [
    {
        title: "问卷里的文章标题",
        author: "问卷里的作者名",
        cate: "青年观点",
        content: "这是文章的具体内容，点击文章后会在这里弹窗显示。",
        check: true
    }
];

function render() {
  const kw = document.getElementById("search").value.toLowerCase();
  const cate = document.querySelector(".tab.active").dataset.cate;
  const list = document.getElementById("list");
  let html = "";
  articles.forEach((art,i)=>{
    if (!art.check) return;
    if (cate!=="all" && art.cate!==cate) return;
    if (!art.title.toLowerCase().includes(kw) && !art.content.toLowerCase().includes(kw)) return;
    html+=`<div class="article" onclick="openArt(${i})"><h3>${art.title}</h3><div class="info">作者：${art.author}｜${art.cate}</div></div>`;
  });
  list.innerHTML = html;
}

function openArt(i){
  const a=articles[i];
  document.getElementById("modalTitle").innerText=a.title;
  document.getElementById("modalInfo").innerText=`作者：${a.author}｜${a.cate}`;
  document.getElementById("modalContent").innerText=a.content;
  document.getElementById("modal").style.display="flex";
}
function closeModal(){
  document.getElementById("modal").style.display="none";
}

document.getElementById("search").addEventListener("input",render);
document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    render();
  });
});

// 初始渲染
render();
</script>
</body>
</html>
