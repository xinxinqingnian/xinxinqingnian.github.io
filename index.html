<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新新青年</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
body {
  background: #f5f5f5;
  color: #333;
}
.header {
  text-align: center;
  padding: 20px 15px 10px;
}
.header h1 {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 4px;
}
.header .tagline {
  font-size: 14px;
  color: #666;
  margin-bottom: 15px;
}
.submit-btn {
  background: #0078ff;
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
}
.search-bar {
  margin: 12px 15px;
}
.search-bar input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 14px;
}
.tabs {
  display: flex;
  gap: 8px;
  padding: 0 15px 12px;
  overflow-x: auto;
}
.tab {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 13px;
  background: #fff;
  border: 1px solid #ddd;
  white-space: nowrap;
}
.tab.active {
  background: #0078ff;
  color: white;
  border-color: #0078ff;
}
.article-list {
  padding: 0 15px;
}
.article-item {
  background: white;
  padding: 15px;
  border-radius: 8px;
  margin-bottom: 10px;
}
.article-item h3 {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 4px;
}
.article-item .meta {
  font-size: 12px;
  color: #666;
}
.rules-box {
  background: white;
  padding: 15px;
  border-radius: 8px;
  margin: 20px 15px;
  border-left: 3px solid #333;
}
.rules-box h2 {
  font-size: 16px;
  margin-bottom: 10px;
}
.rules-box p {
  font-size: 14px;
  margin-bottom: 8px;
}
.rules-box strong {
  font-size: 15px;
}
.footer {
  text-align: center;
  font-size: 12px;
  color: #999;
  padding: 20px;
}
.footer a {
  color: #666;
  text-decoration: none;
}
</style>
</head>
<body>

<div class="header">
  <h1>新新青年</h1>
  <div class="tagline">为青年发声</div>
  <a href="https://wj.qq.com/s2/26084616/2a3d/" class="submit-btn" target="_blank">点击投稿</a>
</div>

<div class="search-bar">
  <input type="text" placeholder="搜索文章标题或内容">
</div>

<div class="tabs">
  <div class="tab active">全部</div>
  <div class="tab">青年观点</div>
  <div class="tab">文艺副刊</div>
  <div class="tab">生活纪实</div>
  <div class="tab">行动倡议</div>
  <div class="tab">其他</div>
</div>

<div class="article-list">
  <div class="article-item">
    <h3>问卷里的文章标题</h3>
    <div class="meta">作者：问卷里的作者名 | 青年观点</div>
  </div>
</div>

<div class="rules-box">
  <h2>发文规则</h2>
  <p><strong>一、不反国家，不反党</strong><br>
  立足家国，维护公共利益，拒绝一切损害国家与社会稳定的言论。</p>
  <p><strong>二、不人身攻击，不指名道姓辱骂</strong><br>
  讨论现象，不针对个人；批判问题，不进行羞辱与网暴。</p>
  <p><strong>三、只写真实与真心</strong><br>
  写你看见的、听见的、想说的、经历的、相信的、希望的、恨的、爱的。</p>
  <p><strong>四、我们批判体系的黑暗面，而非全盘否定</strong><br>
  正视问题，反思弊病，目的是推动改变、守护公平。</p>
  <p style="margin-top:10px;font-weight:bold;">青年发声，有边界，有温度，有力量。</p>
</div>

<div class="footer">
  <p>© 2026 新新青年 · 思想与青年同行</p>
  <p style="margin-top:8px;">

  </p>
</div>
