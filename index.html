<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>新新青年</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f5;padding:20px;max-width:900px;margin:auto}
.header{text-align:center;margin-bottom:20px}
.search{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;margin-bottom:15px;font-size:16px}
.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.tab{padding:8px 12px;background:#fff;border:1px solid #ccc;border-radius:20px;cursor:pointer}
.tab.active{background:#222;color:#fff}
.article{background:#fff;padding:16px;border-radius:10px;margin-bottom:12px}
.article h3{margin-bottom:8px}
.article .info{font-size:14px;color:#666;margin-bottom:8px}
.article .content{line-height:1.6}
</style>
</head>
<body>

<div class="header">
<h1>新新青年</h1>
<p>为青年发声</p>
</div>

<input class="search" id="search" placeholder="搜索标题、内容…">

<div class="tabs">
<div class="tab active" data-cate="all">全部</div>
<div class="tab" data-cate="青年观点">青年观点</div>
<div class="tab" data-cate="文艺副刊">文艺副刊</div>
<div class="tab" data-cate="生活纪实">生活纪实</div>
<div class="tab" data-cate="行动倡议">行动倡议</div>
<div class="tab" data-cate="其他">其他</div>
</div>

<div id="list"></div>

<script>
const articles = [

];

const list = document.getElementById('list');
const search = document.getElementById('search');
const tabs = document.querySelectorAll('.tab');

function render(){
  let html = '';
  const kw = search.value.toLowerCase();
  const activeCate = document.querySelector('.tab.active').dataset.cate;

  articles.forEach(art => {
    if (!art.check) return;
    if (activeCate !== 'all' && art.cate !== activeCate) return;
    if (!art.title.toLowerCase().includes(kw) && !art.content.toLowerCase().includes(kw)) return;

    html += `
    <div class="article">
      <h3>${art.title}</h3>
      <div class="info">作者：${art.author}｜${art.cate}</div>
      <div class="content">${art.content}</div>
    </div>`;
  });
  list.innerHTML = html;
}

search.addEventListener('input', render);
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    render();
  });
});

render();
</script>
</body>
</html>
